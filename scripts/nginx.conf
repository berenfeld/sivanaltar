# sivanaltar.com — Nginx configuration
# Certbot manages the SSL cert at /etc/letsencrypt/live/sivanaltar.com/

# Redirect bare HTTP → HTTPS www
server {
    listen 80;
    server_name sivanaltar.com www.sivanaltar.com;
    return 301 https://www.sivanaltar.com$request_uri;
}

# Redirect HTTPS non-www → HTTPS www
server {
    listen 443 ssl;
    server_name sivanaltar.com;
    ssl_certificate     /etc/letsencrypt/live/sivanaltar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sivanaltar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.sivanaltar.com$request_uri;
}

# Main HTTPS www server
server {
    listen 443 ssl;
    server_name www.sivanaltar.com;
    ssl_certificate     /etc/letsencrypt/live/sivanaltar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sivanaltar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sivanaltar/app/dist;
    index index.html;

    client_max_body_size 25M;

    location /uploads/ {
        alias /var/www/sivanaltar/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
