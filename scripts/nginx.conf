# sivanaltar.com — Nginx configuration
# Certbot manages the SSL cert at /etc/letsencrypt/live/sivanaltar.com/

# Redirect bare HTTP → HTTPS www
server {
    listen 80;
    server_name sivanaltar.com www.sivanaltar.com;
    return 301 https://www.sivanaltar.com$request_uri;
}

# Redirect HTTPS non-www → HTTPS www
server {
    listen 443 ssl;
    server_name sivanaltar.com;
    ssl_certificate     /etc/letsencrypt/live/sivanaltar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sivanaltar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.sivanaltar.com$request_uri;
}

# Main HTTPS www server
server {
    listen 443 ssl;
    server_name www.sivanaltar.com;
    ssl_certificate     /etc/letsencrypt/live/sivanaltar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sivanaltar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sivanaltar/app/dist;
    index index.html;

    client_max_body_size 25M;

    # ETags on by default in nginx — generated from inode+size+mtime (file hash proxy).
    # Cache-Control: no-cache means "store locally but always revalidate".
    # Browser sends If-None-Match; server replies 304 if unchanged (zero re-download).
    etag on;

    # User-uploaded images — validate every request via ETag
    location /uploads/ {
        alias /var/www/sivanaltar/uploads/;
        add_header Cache-Control "public, no-cache";
    }

    # Static images bundled with the app — validate every request via ETag
    location /images/ {
        add_header Cache-Control "public, no-cache";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — allow the www origin only (non-www redirects before reaching here)
        add_header Access-Control-Allow-Origin "https://www.sivanaltar.com" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
