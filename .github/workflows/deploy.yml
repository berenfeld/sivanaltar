name: Deploy to VM

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://www.sivanaltar.com/api

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ubuntu@${{ secrets.SSH_HOST }}:/var/www/sivanaltar/app/dist/

      - name: Upload server files
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .env \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/ \
            ubuntu@${{ secrets.SSH_HOST }}:/var/www/sivanaltar/server/

      - name: Upload nginx config and reload
        run: |
          scp -i ~/.ssh/deploy_key scripts/nginx.conf \
            ubuntu@${{ secrets.SSH_HOST }}:/tmp/nginx.conf
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} \
            "sudo cp /tmp/nginx.conf /etc/nginx/sites-available/sivanaltar && sudo nginx -t && sudo systemctl reload nginx"

      - name: Install server dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/sivanaltar/server
            npm install --omit=dev
            set -a && source .env && set +a && npm run migrate
            pm2 restart sivanaltar || pm2 start index.js --name sivanaltar
            pm2 save
          EOF

      - name: Health check
        run: |
          sleep 3
          curl -f http://${{ secrets.SSH_HOST }}/api/health

      # Pre-render every URL in the live sitemap with a real browser so that
      # crawlers (Bing, Facebook, WhatsApp) receive fully-populated HTML without
      # having to execute JavaScript themselves. The files land in dist/prerender/
      # and nginx serves them ahead of the SPA shell.
      - name: Install Playwright for pre-render
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Pre-render sitemap pages
        run: node scripts/prerender.js

      - name: Upload pre-rendered HTML to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/prerender/ \
            ubuntu@${{ secrets.SSH_HOST }}:/var/www/sivanaltar/app/dist/prerender/
